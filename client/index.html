<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VRM Audio Lip Sync</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
      "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@1.0.3/lib/three-vrm.module.js"
    }
  }
  </script>
</head>
<body>
  <style>
    body, html {
      background: transparent !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    canvas {
      background: transparent !important;
    }
  </style>

<!-- SUBTITLE CONTAINER, UNCOMMENT THIS AND SUBTITLES IN APP JS FOR IN BROWSER MODE-->
<!-- IF OBS STREAMING, COMMENT OUT THIS ONE AND THE ONE IN APP JS FOR SEPERATE OVERLAYS -->


 <!-- <div id="subtitle-container"></div> -->


  <!-- MANUAL TEXT INPUT -->
  <div id="manual-input-box" style="
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
  ">

      <button id="uploadBtn"
          style="
              width: 55px;
              height: 55px;

              border-radius: 50%;
              border: 1px solid rgba(255, 255, 255, 0.35);

              background: rgba(255, 255, 255, 0.18);
              backdrop-filter: blur(12px);
              -webkit-backdrop-filter: blur(12px);

              color: white;
              cursor: pointer;
              font-size: 28px;
              font-weight: bold;

              display: flex;
              justify-content: center;
              align-items: center;

              transition: 0.2s ease;
              box-shadow: 0 4px 20px rgba(0,0,0,0.35);

              -webkit-text-stroke: 1px rgba(0,0,0,0.45);
              text-shadow: 0 0 6px rgba(0,0,0,0.55);
          "
          onmouseover="this.style.background='rgba(255,255,255,0.28)'"
          onmouseout="this.style.background='rgba(255,255,255,0.18)'">
      +
  </button>

      <button id="moneyBtn"
        style="
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(76, 175, 80, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #4CAF50;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            margin-right: 8px;
        "
        onmouseover="this.style.background='rgba(76, 175, 80, 0.4)'"
        onmouseout="this.style.background='rgba(76, 175, 80, 0.25)'"
        title="Send money to Riko">
        💰
    </button>

  <input id="fileInput" type="file" style="display:none">


      <input id="manualInput" 
            type="text" 
            placeholder="Write something to Riko..."
            style="
                  width: 55%;
                  padding: 12px 16px;
                  font-size: 18px;

                  border-radius: 14px;
                  border: 1px solid rgba(255, 255, 255, 0.35);

                  background: rgba(255, 255, 255, 0.15);
                  backdrop-filter: blur(12px);
                  -webkit-backdrop-filter: blur(12px);

                  color: rgb(27, 27, 27);
                  outline: none;
                  

                  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            ">

      
      <button id="sendTextBtn" 
              style="
                  width: 55px;
                  height: 55px;

                  border-radius: 50%;
                  border: 1px solid rgba(255, 255, 255, 0.35);

                  background: rgba(255, 255, 255, 0.18);
                  backdrop-filter: blur(12px);
                  -webkit-backdrop-filter: blur(12px);

                  color: white;
                  font-size: 22px;
                  cursor: pointer;

                  display: flex;
                  justify-content: center;
                  align-items: center;

                  /* improves visibility on light background */
                  -webkit-text-stroke: 1px rgba(0,0,0,0.45);
                  text-shadow: 0 0 6px rgba(0,0,0,0.55);

                  box-shadow: 0 4px 20px rgba(0,0,0,0.35);

                  transition: 0.2s ease;
              "
              onmouseover="this.style.background='rgba(255,255,255,0.28)'"
              onmouseout="this.style.background='rgba(255,255,255,0.18)'">
          ➤
      </button>

  </div>



  <!-- <div id="status">Initializing...</div> -->
  <script type="module" src="./app.js"></script>
</body>
</html>
